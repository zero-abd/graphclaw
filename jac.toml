[project]
name = "graphclaw"
version = "0.1.0"
description = "Graph-native multi-agent AI platform powered by Jac OSP"
authors = []

[plugins.byllm]
system_prompt = "You are Graphclaw, a graph-native AI agent. You reason carefully, use tools efficiently, and always ground your responses in the memory graph."

[plugins.byllm.model]
default_model = "openrouter/anthropic/claude-sonnet-4-6"
api_key = ""
base_url = "https://openrouter.ai/api/v1"
verbose = false

[plugins.byllm.call_params]
temperature = 0.7
max_tokens = 8192

[plugins.byllm.litellm]
local_cost_map = true
drop_params = true
debug = false

[plugins.byllm.fallback]
strategy = "fallback"
num_retries = 2
timeout = 120.0

[server]
host = "0.0.0.0"
port = 8000

[auth]
enabled = false

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"
